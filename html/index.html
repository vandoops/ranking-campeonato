<body>


  <!-- MENU SUPERIOR -->

 <div class="container">
<h1>Ranking Bruxaria EC</h1>

<div class="ranking-container">

<div class="ranking-box">
<h2>Maiores Medalhistas</h2>
<div id="rankingMedalhas"></div>
</div>


<div class="ranking-box">
<h2>Maiores Pontuadores</h2>

<div id="mensagemZoeira" class="mensagem-zoeira"></div>

<div id="rankingPontos"></div>
</div>


</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span id="fechar">&times;</span>
<div id="detalhes"></div>
</div>
</div>
</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "ranking-campeoes.firebaseapp.com",
projectId: "ranking-campeoes",
storageBucket: "ranking-campeoes.firebasestorage.app",
messagingSenderId: "1049217546195",
appId: "1:1049217546195:web:6a10959a84949e3456e126"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const podio = document.getElementById("podio");
const galeria = document.getElementById("galeria");
const modal = document.getElementById("modal");
const detalhes = document.getElementById("detalhes");

document.getElementById("fechar").onclick = () => modal.style.display = "none";

onSnapshot(collection(db, "campeonatos"), (snap) => {

const stats = {};

snap.forEach(docSnap => {

const data = docSnap.data();

["primeiro","segundo","terceiro"].forEach(pos => {

const nome = data[pos];

if(!nome) return;

if(!stats[nome]){
stats[nome] = {
primeiro:0,
segundo:0,
terceiro:0,
pontos:0
};
}

stats[nome][pos]++;

/* pontos */
if(pos === "primeiro") stats[nome].pontos += 3;
if(pos === "segundo") stats[nome].pontos += 1;

});

});


/* ================= MEDALHAS ================= */

const rankingMedalhas = Object.entries(stats).sort((a,b)=>{

const totalA = a[1].primeiro + a[1].segundo + a[1].terceiro;
const totalB = b[1].primeiro + b[1].segundo + b[1].terceiro;

if(totalB !== totalA) return totalB - totalA;
if(b[1].primeiro !== a[1].primeiro) return b[1].primeiro - a[1].primeiro;
if(b[1].segundo !== a[1].segundo) return b[1].segundo - a[1].segundo;

return b[1].terceiro - a[1].terceiro;

});


/* ================= PONTOS ================= */




/* ================= MOSTRAR ================= */

const divMedalhas = document.getElementById("rankingMedalhas");
const divPontos = document.getElementById("rankingPontos");

divMedalhas.innerHTML = "";
divPontos.innerHTML = "";

rankingMedalhas.forEach((p,i)=>{

divMedalhas.innerHTML += `
<div class="linha-ranking">
<span>${i+1}º ${p[0]}</span>
<span>🥇 ${p[1].primeiro} 🥈 ${p[1].segundo} 🥉 ${p[1].terceiro}</span>
</div>
`;

});




});


onSnapshot(collection(db, "pontuacoes"), (snap) => {

const divPontos = document.getElementById("rankingPontos");
divPontos.innerHTML = "";

const ranking = {};

snap.forEach(doc => {

const data = doc.data();

const pontos =
(data.vitorias * 3) +
(data.empates * 1);

if(!ranking[data.player]){
ranking[data.player] = 0;
}

ranking[data.player] += pontos;

});

const lista = Object.entries(ranking)
.sort((a,b)=> b[1] - a[1]);

if(lista.length > 0){

const lider = lista[0][0];
const vice = lista[1] ? lista[1][0] : "";
const viceLanterna = lista[lista.length-2] ? lista[lista.length-2][0] : "";
const lanterna = lista[lista.length-1][0];

document.getElementById("mensagemZoeira").innerHTML =
`<div class="msg">👑 ${lider} Pode investigar… isso tá com cara de magia negra." 😆 </div>
<div class="msg">🔥 ${vice} Tá só esperando o líder errar a poção." 🧪</div>
<div class="msg">⚠️ ${viceLanterna} A magia desse aqui tá vencida." ⚠️</div>
<div class="msg">🐢 ${lanterna} Nem com magia negra tá funcionando.</div>`;

}

lista.forEach((p,i)=>{

let zoeira = "";

if(i === 0){
zoeira = "👑";
}

if(i === 1){
zoeira = "🔥";
}

if(i === lista.length - 2){
zoeira = "⚠️";
}

if(i === lista.length - 1){
zoeira = "🐢";
}

divPontos.innerHTML += `
<div class="linha-ranking">

<div class="lado-esq">
${i+1}º ${p[0]}
</div>

<div class="lado-dir">
${p[1]} pts
<span class="zoeira">${zoeira || ""}</span>
</div>

</div>
`;

});

});

</script>
