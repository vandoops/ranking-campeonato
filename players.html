<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players</title>
<link rel="icon" href="logopng.png" type="image/png">
<link rel="stylesheet" href="players.css">
<link rel="stylesheet" href="header.css">



</head>
<body>
<script>

if(localStorage.getItem("bruxaria_logado") !== "true"){
window.location.href = "login.html";
}

</script>
<!-- HEADER BANNER -->
<div class="header-banner">
  <div class="banner-stripe"></div>
  <div class="header-content">
    <div class="header-left">
      <div class="menu-hamburger" role="button" aria-label="Abrir menu">&#9776;</div>
      <div class="menu-abas">
        <div class="menu-left">
          <a href="index.html" class="aba">HOME</a>
          <a href="ranking.html" class="aba">RANKING</a>
          <a href="galeria.html" class="aba">FOTOS CAMPEONATO</a>
          <a href="galeria-gols.html" class="aba">GALERIA DE GOLS</a>
          <a href="regras.html" class="aba">REGRAS</a>
        </div>
        <div class="menu-right">
          <a href="admin.html" class="aba aba-admin">ADMIN</a>
          <a href="players.html" class="aba aba-admin aba-active">PLAYERS</a>
        </div>
      </div>
    </div>
    <div class="header-right">
      <img src="logopng.png" alt="Logo Copa Bruxaria" class="header-logo-container">
      <button id="btnLogout" class="header-logout">Sair</button>
    </div>
  </div>
  <div class="banner-pink"></div>
</div>

<div class="container">

<h1>Cadastro de Players</h1>

<div class="card">

<input type="text" id="novoPlayer" placeholder="Nome do player">

<button id="addPlayer">
Adicionar Player
</button>

</div>

<h2>Players cadastrados</h2>

<ul id="listaPlayers"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "ranking-campeoes.firebaseapp.com",
projectId: "ranking-campeoes",
storageBucket: "ranking-campeoes.firebasestorage.app",
messagingSenderId: "1049217546195",
appId: "1:1049217546195:web:6a10959a84949e3456e126"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ELEMENTOS ================= */

const listaPlayers = document.getElementById("listaPlayers");

/* ================= LOGOUT ================= */

document.getElementById("btnLogout").onclick = () => {
localStorage.removeItem("bruxaria_logado");
location.reload();
location.reload();
};

/* ================= ADICIONAR PLAYER ================= */

document.getElementById("addPlayer").onclick = async () => {

const nome = document.getElementById("novoPlayer").value.trim();

if (!nome) return;

await addDoc(collection(db,"players"),{
nome
});

document.getElementById("novoPlayer").value = "";

};

/* ================= LISTAR PLAYERS ================= */

onSnapshot(collection(db,"players"),(snap)=>{

listaPlayers.innerHTML="";

snap.forEach(docSnap=>{

const data = docSnap.data();

const li = document.createElement("li");

li.innerHTML = `
${data.nome}
<button class="excluir">❌</button>
`;

li.querySelector("button").onclick = async ()=>{

if(confirm("Excluir player?")){

await deleteDoc(doc(db,"players",docSnap.id));

}

};

listaPlayers.appendChild(li);

});

});

</script>

<script>
  const hamburger = document.querySelector('.menu-hamburger');
  const menuAbas = document.querySelector('.menu-abas');
  if (hamburger && menuAbas) {
    hamburger.addEventListener('click', () => {
      menuAbas.classList.toggle('active');
    });
  }
</script>

<script>

const btnLogout = document.getElementById("btnLogout");

if(btnLogout){
btnLogout.onclick = () => {

localStorage.removeItem("bruxaria_logado");

window.location.href = "login.html";

};
}

</script>

<script>
(function(){
  const path = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.menu-links a, .menu-abas a').forEach(a=>{
    const href = a.getAttribute('href');
    if(href === path || (href === 'index.html' && (path === '' || path === ''))){
      a.classList.add('selected');
      a.classList.add('aba-active');
    } else {
      a.classList.remove('selected');
      a.classList.remove('aba-active');
    }
  });
})();
</script>
</body>
</html>
