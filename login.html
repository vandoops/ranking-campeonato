<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-overlay">

<img src="logopng.png" class="login-logo">

<div class="login-box">

<h2>🔐 Acesso Bruxaria</h2>

<input 
type="password" 
id="senhaInput"
placeholder="Digite a senha ai Bruxo"
>

<button id="btnLogin">
Entra ai Bruxo
</button>

<p id="erroLogin" class="erro-login"></p>

</div>

</div>

<script>

const SENHA = "lecoloco";

const senhaInput = document.getElementById("senhaInput");
const btnLogin = document.getElementById("btnLogin");
const erroLogin = document.getElementById("erroLogin");

btnLogin.onclick = () => {

if(senhaInput.value === SENHA){

localStorage.setItem("adminLogado","true");

window.location.href = "admin.html";

}else{

erroLogin.textContent = "Senha incorreta!";

}

};

</script>



</body>
</html>
