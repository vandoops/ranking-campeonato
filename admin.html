<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<link rel="icon" href="logopng.png" type="image/png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="header.css">




<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  

  <script>
    

if(localStorage.getItem("bruxaria_logado") !== "true"){
window.location.href = "login.html";
}

</script>

  <!-- HEADER BANNER -->
  <div class="header-banner">
    <div class="banner-stripe"></div>
    <div class="header-content">
      <div class="header-left">
        <div class="menu-hamburger" role="button" aria-label="Abrir menu">&#9776;</div>
        <div class="menu-abas">
          <a href="home.html" class="aba">HOME</a>
          <a href="index.html" class="aba">RANKING</a>
          <a href="galeria.html" class="aba">FOTOS CAMPEONATO</a>
          <a href="galeria-gols.html" class="aba">GALERIA DE GOLS</a>
          <a href="admin.html" class="aba aba-active">ADMIN</a>
          <a href="players.html" class="aba">PLAYERS</a>
          <a href="regras.html" class="aba">REGRAS</a>
        </div>
      </div>
      <div class="header-right">
        <img src="logopng.png" alt="Logo Copa Bruxaria" class="header-logo-container">
        <button id="btnLogout" class="header-logout btn-logout-menu">Sair</button>
      </div>
    </div>
    <div class="banner-pink"></div>
  </div>



<div class="container">

<main class="main">

<div class="card-admin">

<h2>Criar Campeonato</h2>

<label>Nome do Campeonato</label>
<input type="text" id="nomeCampeonato">

<h3>Pódio</h3>

<div class="linha-podio">
<label>🥇 Campeão</label>
<select id="primeiroLugar"></select>
</div>

<div class="linha-podio">
<label>🥈 Vice</label>
<select id="segundoLugar"></select>
</div>

<div class="linha-podio">
<label>🥉 Terceiro</label>
<select id="terceiroLugar"></select>
</div>

<hr>

<h3>📊 Estatísticas</h3>

<div class="linha-estat">
<label>⚽ Melhor Ataque</label>
<select id="melhorAtaque"></select>
</div>

<div class="linha-estat">
<label>🛡 Melhor Defesa</label>
<select id="melhorDefesa"></select>
</div>

<div class="linha-estat">
<label>❌ Pior Ataque</label>
<select id="piorAtaque"></select>
</div>

<div class="linha-estat">
<label>🥅 Pior Defesa</label>
<select id="piorDefesa"></select>
</div>
<hr>

<h3>📸 Imagem do Campeão</h3>
<input type="file" id="imagemCampeonato">

<h3>⚽  Gol Mais bonito do Campeonato</h3>
<input type="file" id="videoGol" accept="video/*">

<label>Nome de quem fez essa Obra de arte</label>
<input type="text" id="donoGol" placeholder="Ex: Bruxo da Silva">

<br><br>

<button id="criarCampeonato">Salvar Campeonato</button>

<hr>

<h3>⚽ Pontuação Players</h3>

<label>Player</label>
<select id="playerPontuacao"></select>

<label>Pontuação Atual</label>
<input type="number" id="pontos" min="0">

<button id="salvarPontuacao">Salvar Pontuação</button>

<div class="card-admin">

<div class="camp-header" id="headerPontuacoes">
<h4>📊 Pontuações Salvas</h4>
<span class="seta">▼</span>
</div>

<div class="camp-detalhes" id="detalhesPontuacoes">

<table class="tabela-pontos">
<thead>
<tr>
<th>Player</th>
<th>PONTOS</th>
<th></th>
</tr>
</thead>

<tbody id="listaPontuacoes"></tbody>
</table>

</div>
</div>
<h3>Campeonatos bruxaria</h3>
<div id="listaTitulos"></div>

</main>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getFirestore, 
collection, 
addDoc, 
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "ranking-campeoes.firebaseapp.com",
projectId: "ranking-campeoes",
storageBucket: "ranking-campeoes.firebasestorage.app",
messagingSenderId: "1049217546195",
appId: "1:1049217546195:web:6a10959a84949e3456e126"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ELEMENTOS ================= */

const primeiro = document.getElementById("primeiroLugar");
const segundo = document.getElementById("segundoLugar");
const terceiro = document.getElementById("terceiroLugar");

const melhorAtaque = document.getElementById("melhorAtaque");
const melhorDefesa = document.getElementById("melhorDefesa");
const piorAtaque = document.getElementById("piorAtaque");
const piorDefesa = document.getElementById("piorDefesa");



/* ================= CARREGAR PLAYERS NOS SELECTS ================= */

onSnapshot(collection(db, "players"), (snap) => {

primeiro.innerHTML = "";
segundo.innerHTML = "";
terceiro.innerHTML = "";
melhorAtaque.innerHTML = "";
melhorDefesa.innerHTML = "";
piorAtaque.innerHTML = "";
piorDefesa.innerHTML = "";

snap.forEach(docSnap => {

const nome = docSnap.data().nome;

primeiro.innerHTML += `<option value="${nome}">${nome}</option>`;
segundo.innerHTML += `<option value="${nome}">${nome}</option>`;
terceiro.innerHTML += `<option value="${nome}">${nome}</option>`;
melhorAtaque.innerHTML += `<option value="${nome}">${nome}</option>`;
melhorDefesa.innerHTML += `<option value="${nome}">${nome}</option>`;
piorAtaque.innerHTML += `<option value="${nome}">${nome}</option>`;
piorDefesa.innerHTML += `<option value="${nome}">${nome}</option>`;

});

});

const playerPontuacao = document.getElementById("playerPontuacao");

onSnapshot(collection(db, "players"), (snap) => {

playerPontuacao.innerHTML = "";

snap.forEach(docSnap => {

const nome = docSnap.data().nome;

playerPontuacao.innerHTML += `<option value="${nome}">${nome}</option>`;

});

});

/* ================= CRIAR CAMPEONATO ================= */

document.getElementById("criarCampeonato").onclick = async () => {

const nomeCamp = document.getElementById("nomeCampeonato").value;
const imagem = document.getElementById("imagemCampeonato").files[0];
const video = document.getElementById("videoGol").files[0];
const donoGol = document.getElementById("donoGol").value;

if (!nomeCamp) return alert("Digite o nome!");

let imagemURL = "";
let videoURL = "";


// ===== upload imagem =====

if(imagem){

const formData = new FormData();

formData.append("file", imagem);
formData.append("upload_preset", "campeonato_upload");

const res = await fetch("https://api.cloudinary.com/v1_1/dfeyuaheu/image/upload",{
method:"POST",
body:formData
});

const data = await res.json();

imagemURL = data.secure_url;

}


// ===== upload video =====

if(video){

const formDataVideo = new FormData();

formDataVideo.append("file", video);
formDataVideo.append("upload_preset", "campeonato_upload");

const resVideo = await fetch("https://api.cloudinary.com/v1_1/dfeyuaheu/video/upload",{
method:"POST",
body:formDataVideo
});

const dataVideo = await resVideo.json();

videoURL = dataVideo.secure_url;

}


// ===== salvar campeonato =====

await addDoc(collection(db,"campeonatos"),{

nomeCampeonato: nomeCamp,
imagem: imagemURL,
videoGol: videoURL,
donoGol: donoGol,

primeiro: primeiro.value,
segundo: segundo.value,
terceiro: terceiro.value,

melhorAtaque: melhorAtaque.value,
melhorDefesa: melhorDefesa.value,
piorAtaque: piorAtaque.value,
piorDefesa: piorDefesa.value,

data: serverTimestamp()

});

alert("Campeonato salvo!");

};


/* ================= LISTAR CAMPEONATOS ================= */

const campeonatosRef = query(
collection(db, "campeonatos"),
orderBy("data", "asc")
);

onSnapshot(campeonatosRef, (snap) => {

  

const container = document.getElementById("listaTitulos");
container.innerHTML = "";
const ranking = {};

snap.forEach(docSnap => {

const data = docSnap.data();

if(!ranking[data.primeiro]){
ranking[data.primeiro] = {ouro:0,prata:0,bronze:0};
}

if(!ranking[data.segundo]){
ranking[data.segundo] = {ouro:0,prata:0,bronze:0};
}

if(!ranking[data.terceiro]){
ranking[data.terceiro] = {ouro:0,prata:0,bronze:0};
}

ranking[data.primeiro].ouro++;
ranking[data.segundo].prata++;
ranking[data.terceiro].bronze++;

const bloco = document.createElement("div");
bloco.className = "card-admin";

bloco.innerHTML = `
<div class="camp-header">
<h4>🏆 ${data.nomeCampeonato}</h4>
<span class="seta">▼</span>
</div>

<div class="camp-detalhes">
<p>🥇 ${data.primeiro}</p>
<p>🥈 ${data.segundo}</p>
<p>🥉 ${data.terceiro}</p>

<hr>

<p>⚽ Melhor Ataque: ${data.melhorAtaque}</p>
<p>🛡️ Melhor Defesa: ${data.melhorDefesa}</p>
<p>❌ Pior Ataque: ${data.piorAtaque}</p>
<p>🚨 Pior Defesa: ${data.piorDefesa}</p>

<button class="btnExcluir">Excluir</button>
</div>
`;

const header = bloco.querySelector(".camp-header");
const detalhes = bloco.querySelector(".camp-detalhes");
const seta = bloco.querySelector(".seta");
const btnExcluir = bloco.querySelector(".btnExcluir");

detalhes.style.display = "none";

header.onclick = () => {

const aberto = detalhes.style.display === "block";
detalhes.style.display = aberto ? "none" : "block";
seta.textContent = aberto ? "▼" : "▲";

};

btnExcluir.onclick = async () => {

if (confirm("Excluir campeonato?")) {

await deleteDoc(doc(db, "campeonatos", docSnap.id));

}

};

container.appendChild(bloco);

const rankingFinal = [];

for(const player in ranking){

const ouro = ranking[player].ouro;
const prata = ranking[player].prata;
const bronze = ranking[player].bronze;

const pontos = (ouro * 5) + (prata * 3) + (bronze * 1);

rankingFinal.push({
player,
ouro,
prata,
bronze,
pontos
});

}

rankingFinal.sort((a,b)=> b.pontos - a.pontos);

console.log(rankingFinal);

});

});


document.getElementById("salvarPontuacao").onclick = async () => {

const player = document.getElementById("playerPontuacao").value;
const pontos = Number(document.getElementById("pontos").value);

const snap = await getDocs(collection(db,"pontuacoes"));

let encontrado = null;

snap.forEach(docSnap => {
  if(docSnap.data().player === player){
    encontrado = docSnap;
  }
});

if(encontrado){

  await updateDoc(doc(db,"pontuacoes", encontrado.id), {
    pontos: pontos
  });

}else{

  await addDoc(collection(db,"pontuacoes"), {
    player: player,
    pontos: pontos,
    data: serverTimestamp()
  });

}

alert("Pontuação salva!");
};


/* ================= LISTAR PONTUAÇÕES ================= */



onSnapshot(collection(db,"pontuacoes"), (snap) => {

const lista = document.getElementById("listaPontuacoes");
lista.innerHTML = "";

snap.forEach(docSnap => {

  const data = docSnap.data();

  const linha = document.createElement("tr");

  linha.innerHTML = `
    <td>${data.player}</td>
    <td><b>${data.pontos}</b></td>
    <td>
      <button class="btnEditarPontuacao">✏️</button>
      <button class="btnExcluirPontuacao">🗑</button>
    </td>
  `;

  // EXCLUIR
  linha.querySelector(".btnExcluirPontuacao").onclick = async () => {
    if(confirm("Excluir pontuação?")){
      await deleteDoc(doc(db,"pontuacoes",docSnap.id));
    }
  };

  // EDITAR
  linha.querySelector(".btnEditarPontuacao").onclick = async () => {

    const novoValor = prompt(
      "Nova pontuação para " + data.player + ":",
      data.pontos
    );

    if(novoValor === null) return;

    await updateDoc(doc(db,"pontuacoes",docSnap.id), {
      pontos: Number(novoValor)
    });

    alert("Pontuação atualizada!");
  };

  lista.appendChild(linha);

});

});





const headerPontuacoes = document.getElementById("headerPontuacoes");
const detalhesPontuacoes = document.getElementById("detalhesPontuacoes");
const setaPontuacoes = headerPontuacoes.querySelector(".seta");

detalhesPontuacoes.style.display = "none";

headerPontuacoes.onclick = () => {

const aberto = detalhesPontuacoes.style.display === "block";

detalhesPontuacoes.style.display = aberto ? "none" : "block";
setaPontuacoes.textContent = aberto ? "▼" : "▲";

};

</script>

<script>
  const hamburger = document.querySelector('.menu-hamburger');
  const menuAbas = document.querySelector('.menu-abas');
  if (hamburger && menuAbas) {
    hamburger.addEventListener('click', () => {
      menuAbas.classList.toggle('active');
    });
  }
</script>

<script>
document.getElementById("btnLogout").onclick = () => {
    localStorage.removeItem("bruxaria_logado");

    window.location.href = "login.html";

  };
</script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>

$(document).ready(function(){

$('#primeiroLugar').select2({placeholder:"Buscar player..."});
$('#segundoLugar').select2({placeholder:"Buscar player..."});
$('#terceiroLugar').select2({placeholder:"Buscar player..."});

$('#melhorAtaque').select2();
$('#melhorDefesa').select2();
$('#piorAtaque').select2();
$('#piorDefesa').select2();
$('#playerPontuacao').select2();

});

</script>

<script>
(function(){
  const path = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.menu-links a, .menu-abas a').forEach(a=>{
    const href = a.getAttribute('href');
    if(href === path || (href === 'home.html' && (path === '' || path === ''))){
      a.classList.add('selected');
      a.classList.add('aba-active');
    } else {
      a.classList.remove('selected');
      a.classList.remove('aba-active');
    }
  });
})();
</script>
</body>
</html>
