<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="style.css">

<!-- Uploadcare -->
<script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
<script>
UPLOADCARE_PUBLIC_KEY = "33109c1aa40e97fd88cb"; 
</script>

<style>
.uploadcare--widget__button_type_open {
  background: #28a745 !important;
  border: none !important;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginTela" class="login-overlay">

  <img src="logopng.png" alt="Logo do Clã" class="login-logo">

  <div class="login-box">
    <h2>🔐 Acesso Bruxaria</h2>
    <input type="password" id="senhaInput" placeholder="Digite a senha ai Bruxo">
    <button id="btnLogin">Entra ai Bruxo</button>
    <p id="erroLogin" class="erro-login"></p>
  </div>

</div>

<div class="container">

<aside class="sidebar">
<h2>👥 Players / Bruxos</h2>
<input type="text" id="novoPlayer" placeholder="Nome do player / bruxo">
<button id="addPlayer">Adicionar Bruxos</button>
<ul id="listaPlayers"></ul>
</aside>

<main class="main">

<h1>Administrativo Bruxaria</h1>

<div class="topo-admin">
  <a href="index.html" target="_blank" class="btn-ranking">
    🏆 Ver Ranking
  </a>

  <button id="btnLogout" class="btn-logout">
    Sair
  </button>
</div>

<div class="card-admin">

<h2>🏆 Criar Campeonato</h2>

<label>Nome do Campeonato</label>
<input type="text" id="nomeCampeonato">

<h3>Pódio</h3>

<label>🥇 Nome do Campeão</label>
<select id="primeiroLugar"></select>

<label>🥈 Nome do Vice</label>
<select id="segundoLugar"></select>

<label>🥉 Nome do Terceiro</label>
<select id="terceiroLugar"></select>

<hr>

<h3>📊 Estatísticas</h3>

<label>⚽ Melhor Ataque</label>
<select id="melhorAtaque"></select>

<label>🛡️ Melhor Defesa</label>
<select id="melhorDefesa"></select>

<label>❌ Pior Ataque</label>
<select id="piorAtaque"></select>

<label>🚨 Pior Defesa</label>
<select id="piorDefesa"></select>

<hr>

<h3>📸 Imagem do Campeão</h3>

<input 
type="hidden" 
role="uploadcare-uploader"
data-clearable
data-images-only
id="uploadImagem"
/>

<br><br>

<button id="criarCampeonato">Salvar Campeonato</button>

</div>

<h3>Campeonatos bruxaria</h3>
<div id="listaTitulos"></div>

</main>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
getFirestore, 
collection, 
addDoc, 
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= LOGIN ================= */

const SENHA_CORRETA = "lecoloco";

const loginTela = document.getElementById("loginTela");
const btnLogin = document.getElementById("btnLogin");
const senhaInput = document.getElementById("senhaInput");
const erroLogin = document.getElementById("erroLogin");

if (localStorage.getItem("adminLogado") === "true") {
  loginTela.style.display = "none";
}

btnLogin.onclick = () => {
  if (senhaInput.value === SENHA_CORRETA) {
    localStorage.setItem("adminLogado", "true");
    loginTela.style.display = "none";
  } else {
    erroLogin.textContent = "Senha incorreta!";
  }
};

document.getElementById("btnLogout").onclick = () => {
  localStorage.removeItem("adminLogado");
  location.reload();
};

/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "SUA_API_KEY",
authDomain: "ranking-campeoes.firebaseapp.com",
projectId: "ranking-campeoes",
storageBucket: "ranking-campeoes.firebasestorage.app",
messagingSenderId: "1049217546195",
appId: "1:1049217546195:web:6a10959a84949e3456e126"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= ELEMENTOS ================= */

const listaPlayers = document.getElementById("listaPlayers");
const primeiro = document.getElementById("primeiroLugar");
const segundo = document.getElementById("segundoLugar");
const terceiro = document.getElementById("terceiroLugar");

const melhorAtaque = document.getElementById("melhorAtaque");
const melhorDefesa = document.getElementById("melhorDefesa");
const piorAtaque = document.getElementById("piorAtaque");
const piorDefesa = document.getElementById("piorDefesa");

const uploadWidget = uploadcare.Widget('#uploadImagem');



/* ================= PLAYERS ================= */

document.getElementById("addPlayer").onclick = async () => {

const nome = document.getElementById("novoPlayer").value.trim();
if (!nome) return;

await addDoc(collection(db, "players"), { nome });
document.getElementById("novoPlayer").value = "";
};

onSnapshot(collection(db, "players"), (snap) => {

listaPlayers.innerHTML = "";
primeiro.innerHTML = "";
segundo.innerHTML = "";
terceiro.innerHTML = "";
melhorAtaque.innerHTML = "";
melhorDefesa.innerHTML = "";
piorAtaque.innerHTML = "";
piorDefesa.innerHTML = "";

snap.forEach(docSnap => {

const nome = docSnap.data().nome;

const li = document.createElement("li");
li.innerHTML = `
${nome}
<button>❌</button>
`;

li.querySelector("button").onclick = async () => {
if (confirm("Excluir player?")) {
await deleteDoc(doc(db, "players", docSnap.id));
}
};

listaPlayers.appendChild(li);

primeiro.innerHTML += `<option value="${nome}">${nome}</option>`;
segundo.innerHTML += `<option value="${nome}">${nome}</option>`;
terceiro.innerHTML += `<option value="${nome}">${nome}</option>`;
melhorAtaque.innerHTML += `<option value="${nome}">${nome}</option>`;
melhorDefesa.innerHTML += `<option value="${nome}">${nome}</option>`;
piorAtaque.innerHTML += `<option value="${nome}">${nome}</option>`;
piorDefesa.innerHTML += `<option value="${nome}">${nome}</option>`;

});

});

/* ================= CRIAR CAMPEONATO ================= */

document.getElementById("criarCampeonato").onclick = async () => {

const nomeCamp = document.getElementById("nomeCampeonato").value;
if (!nomeCamp) return alert("Digite o nome!");

const fileInfo = await uploadWidget.value();
if (!fileInfo) return alert("Selecione uma imagem!");

await addDoc(collection(db, "campeonatos"), {
nomeCampeonato: nomeCamp,
primeiro: primeiro.value,
segundo: segundo.value,
terceiro: terceiro.value,
melhorAtaque: melhorAtaque.value,
melhorDefesa: melhorDefesa.value,
piorAtaque: piorAtaque.value,
piorDefesa: piorDefesa.value,
imagem: fileInfo.cdnUrl,
data: serverTimestamp()
});

alert("Campeonato salvo!");
};

/* ================= LISTAR CAMPEONATOS ================= */

/* ================= LISTAR CAMPEONATOS ================= */

const campeonatosRef = query(
  collection(db, "campeonatos"),
  orderBy("data", "asc") // antigo → novo
);

onSnapshot(campeonatosRef, (snap) => {

const container = document.getElementById("listaTitulos");
container.innerHTML = "";

snap.forEach(docSnap => {

const data = docSnap.data();

const bloco = document.createElement("div");
bloco.className = "card-admin";

bloco.innerHTML = `
<div class="camp-header">
  <h4>🏆 ${data.nomeCampeonato}</h4>
  <span class="seta">▼</span>
</div>

<div class="camp-detalhes">
  <p>🥇 ${data.primeiro}</p>
  <p>🥈 ${data.segundo}</p>
  <p>🥉 ${data.terceiro}</p>
  <hr>
  <p>⚽ Melhor Ataque: ${data.melhorAtaque}</p>
  <p>🛡️ Melhor Defesa: ${data.melhorDefesa}</p>
  <p>❌ Pior Ataque: ${data.piorAtaque}</p>
  <p>🚨 Pior Defesa: ${data.piorDefesa}</p>

  <button class="btnExcluir">Excluir</button>
</div>
`;

const header = bloco.querySelector(".camp-header");
const detalhes = bloco.querySelector(".camp-detalhes");
const seta = bloco.querySelector(".seta");
const btnExcluir = bloco.querySelector(".btnExcluir");

detalhes.style.display = "none";

header.onclick = () => {
  const aberto = detalhes.style.display === "block";
  detalhes.style.display = aberto ? "none" : "block";
  seta.textContent = aberto ? "▼" : "▲";
};

btnExcluir.onclick = async () => {
  if (confirm("Excluir campeonato?")) {
    await deleteDoc(doc(db, "campeonatos", docSnap.id));
  }
};

container.appendChild(bloco);
});

});



</script>

<script>
UPLOADCARE_LOCALE = "pt";
UPLOADCARE_TRANSLATIONS = {
  buttons: {
    choose: {
      files: {
        one: "Selecionar Imagem",
        other: "Selecionar Imagens"
      }
    }
  }
};
</script>

</body>
</html>
